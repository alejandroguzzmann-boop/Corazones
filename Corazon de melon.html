    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        .neon-hearts {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #0a0a0a;
            overflow: hidden;
        }

        /* Corazón rediseñado: forma más suave y realista */
        .heart {
            position: absolute;
            bottom: -120px;
            animation: floatUp linear infinite;
            pointer-events: none;
            /* Efecto neón suave y brillante */
            filter: drop-shadow(0 0 12px #ff2d95) drop-shadow(0 0 25px #ff2d95) drop-shadow(0 0 50px rgba(255, 45, 149, 0.5));
            opacity: 0.95;
            transition: opacity 0.3s;
        }

        .heart svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .heart svg path {
            fill: transparent;
            stroke: #ff2d95;
            stroke-width: 2.8;
            stroke-linejoin: round;
            stroke-linecap: round;
            /* Sombra para dar brillo interno */
            filter: drop-shadow(0 0 6px #ff2d95) drop-shadow(0 0 18px rgba(255, 45, 149, 0.6));
        }

        /* Animación de flotar hacia arriba con leve rotación */
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.8) rotate(-3deg);
                opacity: 0.95;
            }
            100% {
                transform: translateY(-120vh) scale(1.1) rotate(3deg);
                opacity: 0.1;
            }
        }

        /* Clase para ocultar corazones (no aparecen) */
        .heart.hidden {
            display: none;
        }

        /* Estilos para 80 corazones con posiciones y tamaños variados */

<body>
    <div class="neon-hearts" id="heartContainer">
        <!-- Los corazones se generarán con JavaScript -->
    </div>

    <script>
        (function() {
            const container = document.getElementById('heartContainer');
            const totalHearts = 80; // Número total de corazones
            const appearPercentage = 20; // 20% de aparición

            // Función para generar el SVG del corazón con forma mejorada
            function createHeartSVG() {
                return `
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50,88 C20,65 0,50 0,30 C0,15 15,0 30,0 C40,0 45,10 50,20 C55,10 60,0 70,0 C85,0 100,15 100,30 C100,50 80,65 50,88 Z" 
                              stroke-linejoin="round" stroke-linecap="round"/>
                    </svg>
                `;
            }

            // Generar los corazones con probabilidad del 20%
            for (let i = 1; i <= totalHearts; i++) {
                const heartDiv = document.createElement('div');
                heartDiv.className = 'heart';
                
                // Aplicar la clase 'hidden' al 80% de los corazones (no aparecen)
                const random = Math.random() * 100; // 0-100
                if (random > appearPercentage) {
                    heartDiv.classList.add('hidden');
                }
                
                // Insertar el SVG
                heartDiv.innerHTML = createHeartSVG();
                
                // Añadir al contenedor
                container.appendChild(heartDiv);
            }

            // Nota: Los estilos nth-child se aplican correctamente aunque los elementos
            // estén ocultos, ya que display:none no los elimina del flujo del documento.
        })();
    </script>
